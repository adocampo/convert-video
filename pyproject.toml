[build-system]
requires = ["setuptools >= 68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "convert-video"
version = "1.1.1"
description = "Convert video files using HandBrakeCLI with smart codec detection"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "tqdm",
]

[project.scripts]
convert-video = "convert_video.cli:main"
convert-video-dev = "convert_video.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
